<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление проектами - ОАЗ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/static/html/index.html"><i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span></a>
            <div class="d-flex align-items-center order-lg-last">
                <button class="theme-toggle" id="themeToggle" title="Переключить тему"><i class="fas fa-moon"></i></button>
                <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/html/index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/html/projects.html">Проекты</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/html/donate.html">Благотворительность</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/html/catalog.html">Новости</a></li>
                </ul>
                <ul class="navbar-nav" id="authNav"></ul>
            </div>
        </div>
    </nav>

    <section class="manage-section">
        <div class="container">
            <div class="manage-header">
                <h2 class="manage-title">Управление проектами</h2>
                <button class="btn-add" onclick="showAddProjectModal()"><i class="fas fa-plus"></i> Добавить проект</button>
            </div>
            <div id="projectsList"></div>
        </div>
    </section>

    <!-- Модальное окно (центрированное) -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <h3 class="modal-title" id="modalTitle">Добавить проект</h3>
            <form class="modal-form" id="projectForm" onsubmit="saveProject(event)">
                <input type="hidden" id="editProjectId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <input type="text" id="projectDescription" required>
                </div>
                <div class="form-group">
                    <label>Полное описание</label>
                    <textarea id="projectFullDesc"></textarea>
                </div>
                <div class="form-group">
                    <label>Дата начала</label>
                    <input type="date" id="projectStartDate" required>
                </div>
                <div class="form-group">
                    <label>Дата окончания</label>
                    <input type="date" id="projectEndDate" required>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="projectStatus">
                        <option value="active">Активный</option>
                        <option value="planned">Запланирован</option>
                        <option value="completed">Завершен</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Целевая сумма (руб)</label>
                    <input type="number" id="projectTarget" required min="0">
                </div>
                <div class="form-group">
                    <label>Сумма пожертвования (руб)</label>
                    <input type="number" id="projectDonation" value="2500" min="100">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save">Сохранить</button>
                    <button type="button" class="btn-cancel" onclick="closeProjectModal()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/admin-projects.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                const icon = document.querySelector('#themeToggle i');
                if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
            }
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const icon = this.querySelector('i');
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                    }
                });
            }
            updateAuthUI();
            if (!AppState.currentUser || AppState.currentUser.role !== 'admin') {
                window.location.href = '/static/html/login.html';
            }
            loadProjectsList();
        });
    </script>
</body>
</html>
