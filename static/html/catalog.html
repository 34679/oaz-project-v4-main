    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/static/html/index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <div class="d-flex align-items-center order-lg-last">
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/index.html">Главная</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="projectsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Проекты
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="projectsDropdown">
                            <li><a class="dropdown-item" href="/static/html/projects.html"><i class="fas fa-list"></i> Все проекты</a></li>
                            <li><a class="dropdown-item" href="/static/html/projects.html?filter=active"><i class="fas fa-play-circle"></i> Текущие проекты</a></li>
                            <li><a class="dropdown-item" href="/static/html/projects.html?filter=planned"><i class="fas fa-calendar-alt"></i> Запланированные</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/static/html/donate.html"><i class="fas fa-donate"></i> Поддержать проект</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/static/html/catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- КАТАЛОГ НОВОСТЕЙ -->
    <section class="catalog-section">
        <div class="container">
            <!-- Подсказка о свайпе -->
            <div class="swipe-hint animate-float">
                <i class="fas fa-arrow-left"></i>
                <span>Смахни</span>
                <i class="fas fa-arrow-right"></i>
            </div>

            <h2 class="section-title reveal">НОВОСТИ</h2>

            <!-- Вкладки категорий -->
            <div class="category-tabs reveal">
                <button class="category-tab active" data-category="news">Новости</button>
                <button class="category-tab" data-category="work">Проделанная работа</button>
                <button class="category-tab" data-category="help">Помощь</button>
            </div>

            <!-- Сетка новостей -->
            <div class="news-grid" id="newsGrid">
                <!-- Карточки загружаются через JavaScript -->
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="/static/js/api-client.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/catalog.js"></script>
    <script>
        // Темная тема
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                const icon = document.querySelector('#themeToggle i');
                if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
            }
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const icon = this.querySelector('i');
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                    }
                });
            }
        });
    </script>
</body>
</html>
