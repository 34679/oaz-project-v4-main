<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .project-card-page {
            background-color: var(--card-bg);
            border: 3px dashed var(--black);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .project-card-page:hover {
            border-color: var(--accent-pink);
            box-shadow: 0 5px 20px rgba(247, 86, 124, 0.2);
        }
    </style>
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/static/html/index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <div class="d-flex align-items-center order-lg-last">
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/index.html">Главная</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="projectsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Проекты
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="projectsDropdown">
                            <li><a class="dropdown-item" href="/static/html/projects.html"><i class="fas fa-list"></i> Все проекты</a></li>
                            <li><a class="dropdown-item" href="/static/html/projects.html?filter=active"><i class="fas fa-play-circle"></i> Текущие проекты</a></li>
                            <li><a class="dropdown-item" href="/static/html/projects.html?filter=planned"><i class="fas fa-calendar-alt"></i> Запланированные</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/static/html/donate.html"><i class="fas fa-donate"></i> Поддержать проект</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link" href="/static/html/login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ПРОЕКТЫ -->
    <section class="projects-section">
        <div class="container">
            <h2 class="section-title reveal">Проекты</h2>
            
            <!-- Поиск и сортировка -->
            <div class="projects-toolbar reveal">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск проектов...">
                    <i class="fas fa-search"></i>
                </div>
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Сначала новые</option>
                    <option value="oldest">Сначала старые</option>
                    <option value="name_asc">По названию (А-Я)</option>
                    <option value="name_desc">По названию (Я-А)</option>
                    <option value="progress_desc">По прогрессу (убывание)</option>
                    <option value="progress_asc">По прогрессу (возрастание)</option>
                </select>
            </div>
            
            <!-- Фильтры по статусу -->
            <div style="margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">
                <i class="fas fa-filter"></i> Фильтр по статусу:
            </div>
            <div class="filter-tabs reveal">
                <button class="filter-tab active" data-filter="all">Все</button>
                <button class="filter-tab" data-filter="active">Текущие</button>
                <button class="filter-tab" data-filter="planned">Запланированные</button>
                <button class="filter-tab" data-filter="completed">Завершенные</button>
            </div>
            <!-- Фильтр по категории -->
            <div style="margin: 15px 0 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">
                <i class="fas fa-tags"></i> Фильтр по категории:
            </div>
            <div class="filter-tabs reveal" id="categoryFilters">
                <button class="filter-tab active" data-cat="all">Все категории</button>
                <button class="filter-tab" data-cat="ecology">Экология</button>
                <button class="filter-tab" data-cat="social">Социальное</button>
                <button class="filter-tab" data-cat="education">Образование</button>
                <button class="filter-tab" data-cat="research">Исследования</button>
            </div>
            
            <!-- Сетка проектов -->
            <div class="row" id="projectsGrid">
                <!-- Проекты загружаются через JavaScript -->
            </div>
        </div>
    </section>

    <!-- Модальное окно подтверждения (центрированное) -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Вы уверены, что хотите присоединиться к проекту?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn" style="background-color: #F7567C; border: none;">Да</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="/static/js/api-client.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/projects.js"></script>
    <script>
        // Темная тема
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                const icon = document.querySelector('#themeToggle i');
                if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
            }
            
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const icon = this.querySelector('i');
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                    }
                });
            }
        });
    </script>
</body>
</html>
