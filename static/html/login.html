<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/static/html/index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <div class="d-flex align-items-center order-lg-last">
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/static/html/index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/html/projects.html">Проекты</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/html/donate.html">Благотворительность</a></li>
                    <li class="nav-item"><a class="nav-link" href="/static/html/catalog.html">Новости</a></li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item"><a class="nav-link active" href="/static/html/login.html"><i class="fas fa-sign-in-alt"></i> Вход/Регистрация</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ВХОД -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container animate-slide-up">
                <h2 class="auth-title">Вход</h2>
                
                <form class="auth-form" onsubmit="login(event)">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="Почта" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
                
                <div class="auth-switch">
                    <p>Нет аккаунта? <a href="/static/html/register.html">Зарегистрироваться</a></p>
                </div>
                
                <div style="margin-top: 30px; padding: 15px; background-color: var(--light-blue); border-radius: 10px; text-align: center;">
                    <small style="color: var(--text-muted);">
                        <i class="fas fa-info-circle"></i> 
                        Для входа как администратор:<br>
                        Email: admin@oaz-ocean.ru<br>
                        Пароль: admin123
                    </small>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="/static/js/api-client.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    <script>
        // Темная тема
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                const icon = document.querySelector('#themeToggle i');
                if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
            }
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    const icon = this.querySelector('i');
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                    }
                });
            }
            
            setTimeout(async function() {
                await new Promise(function(r) { setTimeout(r, 100); });
                var redirectUrl = sessionStorage.getItem('redirectAfterLogin');
                if (redirectUrl && AppState.currentUser) {
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirectUrl;
                }
            }, 100);
        });
    </script>
</body>
</html>
