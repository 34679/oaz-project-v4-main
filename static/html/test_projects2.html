<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Test Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/static/html/index.html"><i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span></a>
        </div>
    </nav>
    <section class="projects-section">
        <div class="container">
            <h2 class="section-title">Проекты</h2>
            <div class="projects-toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск проектов...">
                    <i class="fas fa-search"></i>
                </div>
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Сначала новые</option>
                    <option value="oldest">Сначала старые</option>
                    <option value="name_asc">По названию (А-Я)</option>
                </select>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">Все</button>
                <button class="filter-tab" data-filter="active">Текущие</button>
                <button class="filter-tab" data-filter="planned">Запланированные</button>
            </div>
            <div class="row" id="projectsGrid"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/projects.js"></script>
</body>
</html>
